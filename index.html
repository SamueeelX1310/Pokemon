<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour de go</title>

<link rel="stylesheet" href="CSS/Styles.css">
</head>

<body>

<div class="navbar">
  <img src="logo.png" width="110" height="60" alt="Logo">
  <div class="menu">
    <a href="#">TOUR DE GO</a>
    <a href="#pokedex">POKÉDEX</a>
    <a href="#">BEST IV´S</a>
    <a href="#">POKEMON´S DE TEMPORADA</a>
  </div>
</div>

<section class="hero">
  <h1>Tour de go</h1>
</section>

<section class="historia">
  <h2>Inicio</h2>
  <p>Introduccion pk de Go Esta es la historia nanana</p>
</section>

<section id="pokedex">
  <h2>POKÉDEX</h2>
  <div class="pokemon-container" id="pokemonList"></div>
</section>

<div id="pokemonModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div id="modalInfo"></div>
  </div>
</div>

<script>
const container = document.getElementById("pokemonList");

async function cargarPokemon() {
  for (let i = 1; i <= 50; i++) {

    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${i}`);
    const data = await res.json();

    const card = document.createElement("div");
    card.classList.add("pokemon-card");

    card.innerHTML = `
      <img src="${data.sprites.other['official-artwork'].front_default}">
      <p class="pokemon-number">N.º ${data.id.toString().padStart(4,'0')}</p>
      <p class="pokemon-name">${data.name}</p>
      <div class="types">
        ${data.types.map(t => `<span class="type ${t.type.name}">${t.type.name}</span>`).join("")}
      </div>
    `;

    card.addEventListener("click", () => {
      document.getElementById("pokemonModal").style.display = "flex";

      document.getElementById("modalInfo").innerHTML = `
        <h2>${data.name}</h2>
        <img src="${data.sprites.other['official-artwork'].front_default}" width="200">
        <p><b>Peso:</b> ${data.weight/10} kg</p>
        <p><b>Altura:</b> ${data.height/10} m</p>

        <h3>Stats</h3>
        ${data.stats.map(stat => `
          <p>${stat.stat.name}</p>
          <div class="bar">
            <div style="width:${stat.base_stat}px"></div>
          </div>
        `).join("")}
      `;
    });

    container.appendChild(card);
  }
}

cargarPokemon();

document.querySelector(".close").onclick = function() {
  document.getElementById("pokemonModal").style.display = "none";
};
</script>

</body>
</html>
